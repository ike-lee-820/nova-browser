# Nova Browser - Dark Theme Configuration

[colors]
# Background colors
bg_primary = "#1E1E1E"
bg_secondary = "#252526"
bg_tertiary = "#2D2D2D"
bg_hover = "#373737"
bg_active = "#414141"

# Surface colors
surface = "#2B2B2B"
surface_raised = "#323232"
surface_overlay = "rgba(30, 30, 30, 0.94)"

# Text colors
text_primary = "#ECECEC"
text_secondary = "#AAAAAA"
text_tertiary = "#787878"
text_disabled = "#505050"
text_on_accent = "#FFFFFF"

# Accent colors
accent_primary = "#569CFF"
accent_secondary = "#4D8CE6"
accent_tertiary = "#283C64"

# Status colors
success = "#48C767"
warning = "#FFD23D"
error = "#FF5A5A"
info = "#4DB8FF"

# Border colors
border = "#3C3C3C"
border_focused = "#569CFF"
divider = "#323232"

# Tab colors
tab_active_bg = "#1E1E1E"
tab_inactive_bg = "#252526"
tab_hover_bg = "#2D2D2D"

# Toolbar colors
toolbar_bg = "#252526"
address_bar_bg = "#2D2D2D"
address_bar_focus_bg = "#323232"

# Sidebar colors
sidebar_bg = "#212121"
sidebar_item_hover = "#323232"
sidebar_item_active = "#3C3C3C"

# Shadow
shadow_color = "rgba(0, 0, 0, 0.30)"

# Incognito colors
incognito_bg = "#282A36"
incognito_toolbar = "#323440"

[spacing]
item_spacing = 8.0
button_padding_h = 12.0
button_padding_v = 6.0
corner_radius = 8.0
small_corner_radius = 4.0
large_corner_radius = 12.0

[typography]
font_family = "system-ui, -apple-system, sans-serif"
font_size_small = 11.0
font_size_body = 13.0
font_size_heading = 16.0
font_size_title = 18.0
font_size_large = 28.0